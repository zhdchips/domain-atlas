services:
  - type: web
    name: domain-atlas-private
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    renderSubdomainPolicy: enabled
    numInstances: 1
    disk:
      name: domain-atlas-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DEPLOYMENT_MODE
        value: private_owner
      - key: DATA_DIR
        value: /app/data
      - key: PERSISTENT_DATA_ACKNOWLEDGED
        value: "true"
      - key: BACKUP_ENABLED
        value: "true"
      - key: BACKUP_INTERVAL_HOURS
        value: "24"
      - key: BACKUP_RETENTION_COUNT
        value: "7"
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_OAUTH_CALLBACK_URL
        sync: false
      - key: OWNER_GITHUB_USER_ID
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: EXA_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: CHAT_MODEL
        sync: false
      - key: EMBEDDING_BASE_URL
        sync: false
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: EMBEDDING_DIMENSIONS
        sync: false
