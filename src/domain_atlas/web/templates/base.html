<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}?v={{ static_version() }}">
    <script src="{{ url_for('static', path='app.js') }}?v={{ static_version() }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a href="{{ home_href|default('/') }}" class="brand">Domain Atlas</a>
      <nav class="nav">
        <a href="{{ home_href|default('/') }}">{{ nav_label|default("项目") }}</a>
      </nav>
    </header>
    <main class="page{% block page_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
